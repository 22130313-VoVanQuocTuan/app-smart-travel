<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đặt lại mật khẩu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #fff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 400px;
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
      color: #555;
    }

    input[type="password"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #007bff;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #0056b3;
    }

    .message {
      text-align: center;
      margin-top: 15px;
      color: #e63946;
      font-weight: bold;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>Đặt lại mật khẩu</h2>
  <form id="resetForm">
    <div class="form-group">
      <label for="password">Mật khẩu mới</label>
      <input type="password" id="password" required>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Xác nhận mật khẩu</label>
      <input type="password" id="confirmPassword" required>
    </div>

    <button type="submit">Xác nhận</button>
    <p id="message" class="message"></p>
  </form>
</div>

<script>
  const form = document.getElementById("resetForm");
  const message = document.getElementById("message");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const urlParams = new URLSearchParams(window.location.search);

    const token = urlParams.get("token");
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (password !== confirmPassword) {
      message.style.color = "red";
      message.textContent = "⚠️ Mật khẩu xác nhận không khớp!";
      return;
    }

    try {
      const response = await fetch("http://localhost:8080/api/v1/auth/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token:token, password: password, passwordConfirm: confirmPassword})
      });

      const data = await response.json();
      if (response.ok) {
        message.style.color = "green";
        message.textContent = `✅ ${data.msg ||"Đặt lại mật khẩu thành công!"}`;
        form.reset();
      } else {
        const err = await data.msg;
        message.style.color = "red";
        message.textContent = "❌ Lỗi: " + err;
      }
    } catch (error) {
      message.textContent = "❌ Không thể kết nối đến máy chủ!";
    }
  });
</script>
</body>
</html>
